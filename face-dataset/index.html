<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Face Space — Working Gallery</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #191b1a;
        --secondary: #5c625f;
        --muted: #8c928f;
        --faint: #dfe3e1;
        --paper: #f6f7f6;
        --surface: #ffffff;
        --accent: #176b4a;
        --accent-soft: #e4f2eb;
        --working: #8a5a12;
        --working-soft: #fbf0dc;
        --failed: #a13b32;
        --failed-soft: #f8e8e6;
        font-family:
          "Avenir Next", Avenir, "Segoe UI", ui-sans-serif, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid var(--faint);
        background: rgba(255, 255, 255, 0.92);
        padding: 24px 32px;
      }

      .header-inner,
      main {
        width: min(1180px, 100%);
        margin: 0 auto;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        margin: 0 0 8px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(24px, 4vw, 36px);
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin: 0;
      }

      .lede {
        color: var(--secondary);
        font-size: 14px;
        line-height: 1.5;
        margin: 12px 0 0;
        max-width: 680px;
      }

      main {
        padding: 32px;
      }

      .status-bar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .stage {
        font-size: 13px;
        font-weight: 600;
      }

      .sync {
        align-items: center;
        color: var(--muted);
        display: flex;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 11px;
        gap: 8px;
      }

      .pulse {
        background: var(--accent);
        border-radius: 50%;
        height: 7px;
        width: 7px;
      }

      .grid {
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--faint);
        border-radius: 8px;
        overflow: hidden;
      }

      .card.contact-sheet {
        grid-column: 1 / -1;
      }
      .card.contact-sheet .image-shell {
        aspect-ratio: 20 / 9;
      }

      .image-shell {
        aspect-ratio: 1;
        background:
          linear-gradient(
            90deg,
            transparent 49.9%,
            #e9ecea 50%,
            transparent 50.1%
          ),
          linear-gradient(transparent 49.9%, #e9ecea 50%, transparent 50.1%),
          #f1f3f2;
        display: grid;
        place-items: center;
        position: relative;
      }

      .image-shell img {
        display: block;
        height: 100%;
        object-fit: contain;
        width: 100%;
      }

      .placeholder {
        color: var(--muted);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-align: center;
      }

      .card-body {
        padding: 16px;
      }

      .card-heading {
        align-items: start;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      h2 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
      }

      .id {
        color: var(--muted);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 11px;
        margin: 6px 0 0;
      }

      .badge {
        border-radius: 999px;
        flex: none;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
        text-transform: uppercase;
      }

      .badge.complete {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .badge.generating {
        background: var(--working-soft);
        color: var(--working);
      }
      .badge.failed {
        background: var(--failed-soft);
        color: var(--failed);
      }
      .badge.pending {
        background: #ecefed;
        color: var(--secondary);
      }

      .note {
        color: var(--secondary);
        font-size: 13px;
        line-height: 1.45;
        margin: 16px 0 0;
      }

      .facts {
        border-top: 1px solid var(--faint);
        display: flex;
        gap: 20px;
        margin-top: 16px;
        padding-top: 12px;
      }

      .fact-label {
        color: var(--muted);
        display: block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 3px;
        text-transform: uppercase;
      }

      .fact-value {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 11px;
      }

      .error {
        background: var(--failed-soft);
        border: 1px solid #ebc8c4;
        border-radius: 8px;
        color: var(--failed);
        font-size: 13px;
        padding: 12px 16px;
      }

      @media (max-width: 720px) {
        header,
        main {
          padding: 24px 16px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <p class="eyebrow">Synthetic face dataset</p>
        <h1>Face Space</h1>
        <p class="lede">
          A working gallery for controlled identity, symmetry, pose, and
          independent feature transformations. This view updates as artifacts
          are generated.
        </p>
      </div>
    </header>

    <main>
      <div class="status-bar">
        <div class="stage" id="stage">Loading stage…</div>
        <div class="sync">
          <span class="pulse"></span><span id="sync">Connecting…</span>
        </div>
      </div>
      <div id="gallery" class="grid" aria-live="polite" aria-busy="true"></div>
    </main>

    <script>
      const gallery = document.querySelector("#gallery");
      const stage = document.querySelector("#stage");
      const sync = document.querySelector("#sync");
      let lastRevision = "";

      function textElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        element.textContent = text;
        return element;
      }

      function buildCard(item, revision) {
        const card = document.createElement("article");
        card.className =
          item.image_role === "contact_sheet" ? "card contact-sheet" : "card";

        const imageShell = document.createElement("div");
        imageShell.className = "image-shell";
        if (item.status === "complete") {
          const image = document.createElement("img");
          image.src = `${item.image}?v=${encodeURIComponent(revision)}`;
          image.alt = item.label;
          image.loading = "eager";
          imageShell.append(image);
        } else {
          imageShell.append(
            textElement(
              "div",
              "placeholder",
              item.status === "generating"
                ? "GENERATING…"
                : item.status.toUpperCase(),
            ),
          );
        }

        const body = document.createElement("div");
        body.className = "card-body";
        const heading = document.createElement("div");
        heading.className = "card-heading";
        const titleGroup = document.createElement("div");
        titleGroup.append(textElement("h2", "", item.label));
        titleGroup.append(textElement("p", "id", item.id));
        heading.append(titleGroup);
        heading.append(
          textElement("span", `badge ${item.status}`, item.status),
        );
        body.append(heading);
        body.append(textElement("p", "note", item.note || "No note"));

        const facts = document.createElement("div");
        facts.className = "facts";
        for (const [label, value] of [
          ["Presentation", item.sex],
          ["Resolution", item.resolution || "—"],
        ]) {
          const fact = document.createElement("div");
          fact.append(textElement("span", "fact-label", label));
          fact.append(textElement("span", "fact-value", value));
          facts.append(fact);
        }
        body.append(facts);
        card.append(imageShell, body);
        return card;
      }

      async function refresh() {
        try {
          const response = await fetch(`manifest.json?t=${Date.now()}`, {
            cache: "no-store",
          });
          if (!response.ok)
            throw new Error(`manifest returned ${response.status}`);
          const data = await response.json();
          const revision = data.updated_at || JSON.stringify(data);
          if (revision !== lastRevision) {
            gallery.replaceChildren(
              ...data.items.map((item) => buildCard(item, revision)),
            );
            stage.textContent = data.stage;
            lastRevision = revision;
          }
          gallery.setAttribute("aria-busy", "false");
          sync.textContent = `Live · ${new Date().toLocaleTimeString()}`;
        } catch (error) {
          gallery.replaceChildren(
            textElement(
              "div",
              "error",
              `Gallery update failed: ${error.message}`,
            ),
          );
          gallery.setAttribute("aria-busy", "false");
          sync.textContent = "Disconnected";
        }
      }

      refresh();
      setInterval(refresh, 1000);
    </script>
  </body>
</html>
